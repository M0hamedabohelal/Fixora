<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get Started</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .preserve-3d {
        transform-style: preserve-3d;
      }
      .perspective-1000 {
        perspective: 1000px;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
      }
      .animate-float {
        animation: float 3s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div class="min-h-screen bg-[#FDFBF7] font-sans">
      <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]" />
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]" />
      </div>

      <div class="relative z-10 container mx-auto px-4 py-12">
        <div class="max-w-md mx-auto">
          <div class="bg-white rounded-[2rem] shadow-2xl shadow-slate-200/50 p-8 border border-slate-100">
            <div class="text-center mb-8">
              <div class="mb-6">
                <img 
                  src="/logo.png" 
                  alt="Fixora Logo" 
                  class="h-16 object-contain mx-auto"
                  onError="this.style.display='none'"
                />
                <div id="logo-fallback" class="hidden h-16 w-16 rounded-full bg-primary/10 flex items-center justify-center mx-auto">
                  <span class="text-2xl font-bold text-primary">F</span>
                </div>
              </div>
              <h1 class="text-3xl font-bold text-slate-800 mb-3">Get Started</h1>
              <p class="text-slate-500 text-base">
                Choose your account type to begin
              </p>
              <div class="flex justify-center items-center gap-2 mt-6">
                <span class="w-6 h-1.5 rounded-full bg-secondary"></span>
                <span class="w-2 h-1.5 rounded-full bg-slate-200"></span>
                <span class="w-2 h-1.5 rounded-full bg-slate-200"></span>
              </div>
            </div>
            
            <div class="mb-8">
              <div class="text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg p-3 mb-6 hidden" id="image-error">
                ERROR: Cannot read "image.png" (this model does not support image input). Please use text-based UI.
              </div>
              
              <button
                onclick="window.location.href='/register'"
                class="w-full py-4 bg-primary text-white rounded-xl font-bold text-lg shadow-xl shadow-primary/20 hover:bg-primary/90 hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-2"
              >
                <span>Get Started</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                </svg>
              </button>
            </div>
            
            <div class="relative">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-slate-200"></div>
              </div>
              <div class="relative flex justify-center text-sm">
                <span class="px-4 bg-white text-slate-500">or continue with</span>
              </div>
            </div>
            
            <div class="mt-6 grid grid-cols-2 gap-4">
              <button class="flex items-center justify-center gap-2 py-3 px-4 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors">
                <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/google.svg" class="w-5 h-5" alt="Google" />
                <span class="text-sm font-medium">Google</span>
              </button>
              <button class="flex items-center justify-center gap-2 py-3 px-4 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors">
                <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/microsoft.svg" class="w-5 h-5" alt="Microsoft" />
                <span class="text-sm font-medium">Microsoft</span>
              </button>
            </div>
          </div>
        </div>
      </div>
      
      <div class="absolute top-20 right-20 animate-float">
        <div class="w-16 h-16 rounded-2xl bg-blue-100 flex items-center justify-center shadow-sm">
          <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
          </svg>
        </div>
        <span class="text-xs font-semibold px-3 py-1 rounded-full bg-white/50 backdrop-blur-sm shadow-sm text-primary mt-2 block">
          Fixora
        </span>
      </div>
      
      <div class="absolute bottom-20 left-20 animate-float" style="animation-delay: 1s">
        <div class="w-16 h-16 rounded-2xl bg-secondary/10 flex items-center justify-center shadow-sm">
          <svg class="w-8 h-8 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </div>
        <span class="text-xs font-semibold px-3 py-1 rounded-full bg-white/50 backdrop-blur-sm shadow-sm text-secondary mt-2 block">
          Services
        </span>
      </div>
      
      <div class="absolute top-1/2 right-1/4 transform -translate-y-1/2 animate-float" style="animation-delay: 2s">
        <div class="w-14 h-14 rounded-2xl bg-orange-50 flex items-center justify-center shadow-sm">
          <svg class="w-7 h-7 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
          </svg>
        </div>
        <span class="text-xs font-semibold px-2 py-1 rounded-full bg-white/50 backdrop-blur-sm shadow-sm text-orange-600 mt-2 block">
          Support
        </span>
      </div>
    </div>
    
    <script>
      function showImageError() {
        const errorDiv = document.getElementById('image-error');
        if (errorDiv) {
          errorDiv.classList.remove('hidden');
        }
      }
      
      function hideImageError() {
        const errorDiv = document.getElementById('image-error');
        if (errorDiv) {
          errorDiv.classList.add('hidden');
        }
      }
      
      window.addEventListener('load', () => {
        setTimeout(() => {
          showImageError();
        }, 1000);
      });
    </script>
  </body>
</html>
